<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow">
  <title>§3 The Solution — felt manifesto — EBB V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0D2240;
      --cream-warm: #F2EFE8;
      --crimson: #8B1A1A;
      --text-muted: rgba(13,34,64,0.62);
      --text-faint: rgba(13,34,64,0.42);
      --rule: rgba(13,34,64,0.10);
      --rule-soft: rgba(13,34,64,0.06);
      --font-display: 'Libre Baskerville', Georgia, serif;
      --font-ui: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: var(--font-ui);
      background: var(--cream-warm);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    .solution { padding: 88px 24px 96px; }
    .solution__container { max-width: 1080px; margin: 0 auto; }

    .head { max-width: 760px; display: flex; flex-direction: column; gap: 14px; margin-bottom: 64px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font: 700 10px/1 var(--font-ui);
      letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--crimson);
    }
    .eyebrow::before { content: ''; width: 32px; height: 1.5px; background: var(--crimson); }
    .heading {
      font: 400 clamp(30px, 4vw, 44px)/1.2 var(--font-display);
      color: var(--navy);
      letter-spacing: -0.012em;
    }
    .heading em { font-style: italic; color: var(--crimson); font-weight: 400; }
    .lede {
      font: 400 clamp(15px, 1.5vw, 17px)/1.55 var(--font-ui);
      color: var(--text-muted);
      max-width: 620px;
      margin-top: 4px;
    }

    .manifesto {
      list-style: none;
      display: flex; flex-direction: column;
      border-top: 1px solid var(--rule);
    }
    .row {
      display: grid;
      grid-template-columns: 56px 1fr 320px;
      gap: 40px;
      align-items: baseline;
      padding: 32px 0 30px;
      border-bottom: 1px solid var(--rule-soft);
      transition: background 200ms ease;
    }
    .row:last-child { border-bottom: 1px solid var(--rule); }
    .row:hover { background: rgba(13,34,64,0.015); }

    .row__num {
      font: italic 400 22px/1 var(--font-display);
      color: var(--crimson);
      letter-spacing: 0.02em;
    }
    .row__feel {
      font: 400 clamp(22px, 2.6vw, 30px)/1.2 var(--font-display);
      color: var(--navy);
      letter-spacing: -0.008em;
      transition: color 200ms ease;
    }
    .row:hover .row__feel { color: var(--crimson); }

    .row__tech {
      display: flex; flex-direction: column; gap: 6px;
      padding-top: 6px;
    }
    .row__tag {
      font: 500 10px/1 var(--font-mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .row__desc {
      font: 400 13.5px/1.55 var(--font-ui);
      color: var(--text-muted);
    }

    .closing {
      margin-top: 56px;
      padding-top: 36px;
      border-top: 1px solid var(--rule);
      max-width: 820px;
      font: italic 400 clamp(18px, 2vw, 22px)/1.45 var(--font-display);
      color: var(--navy);
    }
    .closing strong { font-weight: 700; font-style: normal; color: var(--crimson); }

    @media (max-width: 820px) {
      .row { grid-template-columns: 40px 1fr; gap: 20px; }
      .row__tech { grid-column: 2; padding-top: 4px; }
    }
  </style>
</head>
<body>

<section class="solution">
  <div class="solution__container">

    <header class="head">
      <span class="eyebrow">the solution</span>
      <h2 class="heading">Run payments <em>without the dread.</em></h2>
      <p class="lede">EBB Systems replaces fragile payment infrastructure with a resilient transaction platform &mdash; so the feelings that come with operating money change too.</p>
    </header>

    <ol class="manifesto" data-manifesto></ol>

    <p class="closing">So your engineers stop <strong>firefighting</strong> &mdash; and start <strong>building</strong>.</p>

  </div>
</section>

<script>
  const ITEMS = [
    { feel: 'Sleep through the night.',                  tag: 'Multi-rail routing',        desc: 'Failures contained at the infrastructure layer. Retries and reversals built in. Customers see successful transactions — not your 3am.' },
    { feel: 'Stop dreading month-end.',                  tag: 'Continuous reconciliation', desc: 'Every operator reconciled continuously. Gaps flagged and resolved before they reach finance.' },
    { feel: "Walk into the regulator's office calm.",    tag: 'Immutable audit trails',    desc: 'Every transaction, checkpoint, and authorisation decision logged immutably. Routine compliance queries answered in seconds.' },
    { feel: 'Stop chasing transactions across systems.', tag: 'Unified transaction view',  desc: "Origination, routing, checkpoints, settlement, ledger entry — every transaction's lifecycle, surfaced from one query." },
    { feel: 'Stop losing sleep over the next breach.',   tag: 'Defence-in-depth',          desc: 'Every payload signed, every connection mutually authenticated, every hop encrypted — inherited by every new operator.' },
    { feel: 'Enter new markets without flinching.',      tag: 'AML, KYC & sanctions',      desc: 'Screening built into every flow. Live on day one of every new corridor.' },
    { feel: 'Say yes to the business — and mean it.',    tag: 'New corridors, fast',       desc: 'Protocol adapters, AML rules, audit schema, reporting templates — all pre-built. New corridors live in weeks, not quarters.' },
    { feel: 'Ship on a Tuesday afternoon.',              tag: 'Safe deployments',          desc: 'Daytime-safe releases, controlled change management, rollback in seconds. No weekend war rooms.' },
  ];
  document.querySelector('[data-manifesto]').innerHTML = ITEMS.map((it, i) => `
    <li class="row">
      <div class="row__num">${String(i+1).padStart(2,'0')}</div>
      <div class="row__feel">${it.feel}</div>
      <div class="row__tech">
        <div class="row__tag">${it.tag}</div>
        <div class="row__desc">${it.desc}</div>
      </div>
    </li>
  `).join('');
</script>

</body>
</html>
