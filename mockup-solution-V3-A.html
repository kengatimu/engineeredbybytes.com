<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow">
  <title>§3 V3-A — canonical solution diagram — EBB V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0D2240;
      --cream-warm: #F2EFE8;
      --crimson: #8B1A1A;
      --text-muted: rgba(13,34,64,0.62);
      --text-faint: rgba(13,34,64,0.42);
      --rule: rgba(13,34,64,0.10);
      --font-display: 'Libre Baskerville', Georgia, serif;
      --font-ui: 'Inter', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: var(--font-ui); background: var(--cream-warm); color: var(--navy); -webkit-font-smoothing: antialiased; }

    .solution { padding: 56px 24px 64px; }
    .solution__container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 28px; }
    .solution__head { max-width: 820px; display: flex; flex-direction: column; gap: 10px; }
    .solution__eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font: 700 10px/1 var(--font-ui);
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--crimson);
    }
    .solution__eyebrow::before { content: ''; width: 28px; height: 1.5px; background: var(--crimson); }
    .solution__heading {
      font: 400 clamp(24px, 3vw, 32px)/1.3 var(--font-display);
      color: var(--navy);
      letter-spacing: -0.005em;
    }
    .solution__heading em { font-style: italic; color: var(--navy); font-weight: 400; }

    .frame {
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 24px 0 8px;
    }
    .frame svg { width: 100%; height: 460px; display: block; }

    .arch .col-label { fill: var(--text-muted); font: 600 10px var(--font-ui); letter-spacing: 0.18em; text-transform: uppercase; }
    .arch .col-sub   { fill: var(--text-faint); font: 400 10px var(--font-mono); letter-spacing: 0.06em; }
    .arch .box       { fill: var(--cream-warm); stroke: var(--navy); stroke-width: 1; opacity: 0.75; }
    .arch .box-text  { fill: var(--navy); font: 500 11px var(--font-ui); }
    .arch .gateway   { fill: var(--navy); stroke: var(--navy); }
    .arch .gw-text   { fill: var(--cream-warm); font: 700 14px var(--font-display); }
    .arch .gw-sub    { fill: rgba(242,239,232,0.55); font: 500 9px var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; }
    .arch .edge      { stroke: rgba(13,34,64,0.2); stroke-width: 1; fill: none; }

    .legend {
      list-style: none; padding: 0; margin: 16px 0 0;
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px 40px;
    }
    .legend li { display: grid; grid-template-columns: 28px 1fr; gap: 10px; align-items: baseline; }
    .legend .n { font: italic 400 14px/1 var(--font-display); color: var(--crimson); }
    .legend .h { font: 700 14px/1.3 var(--font-display); color: var(--navy); margin-bottom: 2px; }
    .legend .b { font: 400 13px/1.5 var(--font-ui); color: rgba(13,34,64,0.7); }

    .closing {
      margin-top: 20px; padding-top: 18px;
      border-top: 1px solid var(--rule);
      max-width: 880px;
      font: italic 400 clamp(16px, 1.8vw, 19px)/1.4 var(--font-display);
      color: var(--navy);
    }
    .closing em { color: var(--crimson); font-style: italic; }

    @media (max-width: 760px) { .legend { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<section class="solution">
  <div class="solution__container">
    <header class="solution__head">
      <span class="solution__eyebrow">the solution</span>
      <h2 class="solution__heading">EBB Systems replaces fragile payment infrastructure <em>with a resilient transaction platform.</em></h2>
    </header>

    <div class="frame">
      <svg class="arch" viewBox="0 0 1100 460">
        <!-- OUTER BORDER PANEL — your corebanking stack (3 items) -->
        <rect x="48" y="48" width="144" height="132" rx="3" fill="none" stroke="rgba(13,34,64,0.4)" stroke-width="1"/>
        <!-- OUTER BORDER PANEL — networks (now 5 items, taller box) -->
        <rect x="908" y="188" width="144" height="212" rx="3" fill="none" stroke="rgba(13,34,64,0.4)" stroke-width="1"/>

        <!-- Spokes (unchanged) -->
        <g>
          <line class="edge" x1="550" y1="210" x2="550" y2="80"/>
          <line class="edge" x1="550" y1="210" x2="720" y2="100"/>
          <line class="edge" x1="550" y1="210" x2="800" y2="210"/>
          <line class="edge" x1="550" y1="210" x2="720" y2="320"/>
          <line class="edge" x1="550" y1="210" x2="550" y2="340"/>
          <line class="edge" x1="550" y1="210" x2="380" y2="320"/>
          <line class="edge" x1="550" y1="210" x2="300" y2="210"/>
          <line class="edge" x1="550" y1="210" x2="380" y2="100"/>
        </g>

        <!-- 8 capability boxes (unchanged) -->
        <g>
          <rect class="box" x="490" y="50" width="120" height="34" rx="3"/><text class="box-text" x="550" y="71" text-anchor="middle">resilient routing</text>
          <rect class="box" x="660" y="74" width="120" height="34" rx="3"/><text class="box-text" x="720" y="95" text-anchor="middle">reconciliation</text>
          <rect class="box" x="740" y="190" width="120" height="34" rx="3"/><text class="box-text" x="800" y="211" text-anchor="middle">audit trails</text>
          <rect class="box" x="660" y="306" width="120" height="34" rx="3"/><text class="box-text" x="720" y="327" text-anchor="middle">transaction view</text>
          <rect class="box" x="490" y="330" width="120" height="34" rx="3"/><text class="box-text" x="550" y="351" text-anchor="middle">defence-in-depth</text>
          <rect class="box" x="320" y="306" width="120" height="34" rx="3"/><text class="box-text" x="380" y="327" text-anchor="middle">AML / KYC</text>
          <rect class="box" x="240" y="190" width="120" height="34" rx="3"/><text class="box-text" x="300" y="211" text-anchor="middle">new corridors</text>
          <rect class="box" x="320" y="74" width="120" height="34" rx="3"/><text class="box-text" x="380" y="95" text-anchor="middle">safe deploys</text>
        </g>

        <!-- EBB centre (unchanged) -->
        <circle class="gateway" cx="550" cy="210" r="48"/>
        <text class="gw-text" x="550" y="208" text-anchor="middle">EBB</text>
        <text class="gw-sub" x="550" y="228" text-anchor="middle">gateway</text>

        <!-- Your corebanking stack (3 items, unchanged from original) -->
        <g>
          <rect class="box" x="60" y="60" width="120" height="28" rx="3"/><text class="box-text" x="120" y="78" text-anchor="middle">Finacle / T24</text>
          <rect class="box" x="60" y="100" width="120" height="28" rx="3"/><text class="box-text" x="120" y="118" text-anchor="middle">FlexCube</text>
          <rect class="box" x="60" y="140" width="120" height="28" rx="3"/><text class="box-text" x="120" y="158" text-anchor="middle">Custom CBS</text>
          <text class="col-sub" x="120" y="200" text-anchor="middle">your corebanking stack</text>
          <line class="edge" x1="180" y1="114" x2="500" y2="200"/>
        </g>

        <!-- Networks — NOW 5 items: mobile money · card networks · inter-banking · cross-border · remittances -->
        <g>
          <rect class="box" x="920" y="200" width="120" height="28" rx="3"/><text class="box-text" x="980" y="218" text-anchor="middle">Mobile money</text>
          <rect class="box" x="920" y="240" width="120" height="28" rx="3"/><text class="box-text" x="980" y="258" text-anchor="middle">Card networks</text>
          <rect class="box" x="920" y="280" width="120" height="28" rx="3"/><text class="box-text" x="980" y="298" text-anchor="middle">Inter-banking</text>
          <rect class="box" x="920" y="320" width="120" height="28" rx="3"/><text class="box-text" x="980" y="338" text-anchor="middle">Cross-border</text>
          <rect class="box" x="920" y="360" width="120" height="28" rx="3"/><text class="box-text" x="980" y="378" text-anchor="middle">Remittances</text>
          <text class="col-sub" x="980" y="420" text-anchor="middle">networks</text>
          <!-- connection line now targets middle item (Inter-banking, cy=294) -->
          <line class="edge" x1="920" y1="294" x2="598" y2="220"/>
        </g>
      </svg>
    </div>

    <ol class="legend" data-legend></ol>
    <p class="closing"><em>So your engineers</em> spend less time operating payments and more time building products that grow the business.</p>
  </div>
</section>

<script>
  const SOLUTIONS = [
    { h: 'Multi-rail routing with built-in retries and reversals', b: 'Failures contained at the infrastructure layer; customers see successful transactions.' },
    { h: 'Continuous reconciliation across every operator',         b: 'Gaps flagged and resolved before they reach finance.' },
    { h: 'Every transaction, checkpoint, and authorisation decision logged immutably', b: 'Regulator queries answered in seconds.' },
    { h: 'Every transaction\'s lifecycle in one place',             b: 'Origination, routing, checkpoints, settlement, ledger entry — surfaced from one query.' },
    { h: 'Defence-in-depth on every payload, inherited by every new operator', b: 'Every payload signed, every connection mutually authenticated, every hop encrypted.' },
    { h: 'AML, KYC, and sanctions screening built into every flow', b: 'Live on day one of every new market.' },
    { h: 'New corridors live in weeks, not quarters',               b: 'Protocol adapters, AML rules, audit schema, and reporting templates all pre-built.' },
    { h: 'Safe deployments and controlled change management',       b: 'Daytime-safe, rollback in seconds.' },
  ];
  document.querySelectorAll('[data-legend]').forEach(ul => {
    ul.innerHTML = SOLUTIONS.map((s,i) => `
      <li><span class="n">${String(i+1).padStart(2,'0')}</span>
        <div><div class="h">${s.h}</div><div class="b">${s.b}</div></div>
      </li>`).join('');
  });
</script>

</body>
</html>
